<div class="chart-card">
  <div class="chart-card-header mb-3">
    <div>
      <h6 class="chart-title mb-0">Inflación <span class="fw-normal text-secondary">(% IPC anual)</span></h6>
      <small class="text-secondary">
        Último año disponible{{ latestYear ? ': ' + latestYear : '' }} ·
        <span class="me-2"><span style="color:#10b981">■</span> &lt; 8%</span>
        <span class="me-2"><span style="color:#f59e0b">■</span> 8–20%</span>
        <span><span style="color:#ef4444">■</span> &gt; 20%</span>
      </small>
    </div>
  </div>

  <div class="chart-wrapper">
    <canvas #inflationCanvas [class.invisible]="loading || error"></canvas>

    @if (loading) {
      <div class="chart-overlay">
        <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
      </div>
    }

    @if (error && !loading) {
      <div class="chart-overlay">
        <span class="text-danger small">
          <i class="bi bi-exclamation-triangle me-1"></i>Error al cargar datos
        </span>
      </div>
    }
  </div>
</div>
